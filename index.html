<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regis Heverton Reis | Portfólio Executivo</title>
    <meta
      name="description"
      content="Portfólio executivo de tecnologia, operações, PMO e governança."
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --blue: #38bdf8;
        --teal: #2dd4bf;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.2), transparent 28%),
          radial-gradient(circle at bottom right, rgba(13, 148, 136, 0.18), transparent 28%),
          var(--bg);
        font-family: "Segoe UI", sans-serif;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.2), transparent 28%),
          radial-gradient(circle at bottom right, rgba(13, 148, 136, 0.18), transparent 28%),
          var(--bg);
        transition: opacity 280ms ease, visibility 280ms ease;
      }

      #app-loader.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loader-card {
        width: min(100%, 860px);
        padding: 28px 24px;
      }

      .loader-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border: 1px solid rgba(56, 189, 248, 0.22);
        border-radius: 999px;
        background: rgba(14, 165, 233, 0.08);
        color: var(--blue);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .loader-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--blue), var(--teal));
        box-shadow: 0 0 18px rgba(56, 189, 248, 0.55);
      }

      .loader-title {
        margin: 22px 0 12px;
        color: var(--text);
        font-size: clamp(44px, 11vw, 86px);
        font-weight: 800;
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .loader-copy {
        max-width: 820px;
        margin: 0 0 22px;
        color: var(--muted);
        font-size: clamp(19px, 4.8vw, 38px);
        font-weight: 600;
        line-height: 1.45;
      }

      .loader-bar {
        position: relative;
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(30, 41, 59, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.12);
      }

      .loader-bar::before {
        content: "";
        position: absolute;
        inset: 0;
        width: 42%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--blue), var(--teal));
        animation: loader-slide 1.1s ease-in-out infinite;
      }

      .loader-footer {
        margin-top: 14px;
        color: #cbd5e1;
        font-size: 13px;
      }

      @keyframes loader-slide {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-C6fsOf1J.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DMOmd__i.css">
  </head>
  <body>
    <div id="app-loader" aria-live="polite" aria-busy="true">
      <div class="loader-card">
        <div class="loader-badge">
          <span class="loader-dot"></span>
          Executivo de Tecnologia & Operações
        </div>
        <h1 class="loader-title">Regis Heverton Reis</h1>
        <p class="loader-copy">
          Transformando complexidade em previsibilidade operacional através de Governança, IA e Liderança Estratégica.
        </p>
        <div class="loader-bar" aria-hidden="true"></div>
        <div class="loader-footer">Carregando experiência, resultados e competências.</div>
      </div>
    </div>
    <div id="root"></div>
  </body>
</html>
